name: CI · Lockatus (GHCR)

# Gate pre-deploy del ecosistema: ningún cambio se publica a GHCR si los tests están en rojo.
# `test` (núcleo cripto, sin DB) + `integ` (2FA / OIDC / recovery / SSO contra Postgres) → build-push.

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: "22" }
      - run: npm ci
      - name: Núcleo cripto (sin DB)
        run: npm test

  integ:
    runs-on: ubuntu-latest
    services:
      db:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: lockatus
          POSTGRES_PASSWORD: ci-secret
          POSTGRES_DB: lockatus
        ports: ["55433:5432"]
        options: >-
          --health-cmd "pg_isready -U lockatus -d lockatus"
          --health-interval 5s --health-timeout 3s --health-retries 12
    env:
      DATABASE_URL: "postgresql://lockatus:ci-secret@127.0.0.1:55433/lockatus"
      LOCKATUS_SECRET: "ci-master-secret-0123456789abcdef"
      LOCKATUS_ADMIN_PASS: "admin1234"
      LOCKATUS_ISSUER: "http://localhost:8081"
      PORT: "8081"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: "22" }
      - run: npm ci
      - name: Levantar Lockatus + la app demo
        run: |
          node server/index.js > /tmp/lk.log 2>&1 &
          PORT=8090 LOCKATUS_ISSUER=http://localhost:8081 node examples/demo-app/server.mjs > /tmp/demo.log 2>&1 &
          npx --yes wait-on http://localhost:8081/health http://localhost:8090/ -t 30000
      - name: Integración (2FA · OIDC · recovery · SSO cliente)
        run: npm run test:integ && node test/client-check.mjs
      - name: Logs si falla
        if: failure()
        run: cat /tmp/lk.log /tmp/demo.log || true

  build-push:
    needs: [test, integ]
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    permissions: { contents: read, packages: write }
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=ref,event=tag
            type=sha,format=short
      - uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
